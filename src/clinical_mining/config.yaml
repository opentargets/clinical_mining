# =================================================
# BASE CONFIGURATION
# =================================================
# This file contains shared infrastructure (database connections, path definitions)
# that all recipes may use. It does not define any workflows on its own.
#
# Add a recipe to activate a workflow:
#   uv run clinical_mining +recipe=clinical_report_generation
#   uv run clinical_mining +recipe=aact_extractor
#
# See README.md for full documentation.
# =================================================

# Database Connection Properties
db_properties:
  aact:
    type: postgresql
    uri: localhost:5432/aact
    schema: ctgov
    user: ${oc.env:AACT_USER,""}
    password: ${oc.env:AACT_PASSWORD,""}

  chembl:
    type: postgresql
    uri: localhost:5432/chembl_36
    schema: public
    user: null
    password: null

# Path Definitions for Local Datasets
datasets:
  disease_index_path: data/inputs/disease
  molecule_index_path: data/inputs/chembl_molecule
  ttd_path: ${oc.env:HOME}/EBI/repos/clinical_mining/data/inputs/P1-05-Drug_disease.txt
  ema_path: ${oc.env:HOME}/EBI/repos/clinical_mining/data/inputs/medicines-output-medicines-report_en.xlsx
  pmda_path: ${oc.env:HOME}/EBI/repos/clinical_mining/data/inputs/pmda_approvals.pdf
  output_path: ${oc.env:HOME}/EBI/repos/clinical_mining/data/outputs

# Workflow (populated by recipes)
workflow: null
